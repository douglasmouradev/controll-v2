openapi: 3.0.3
info:
  title: Controll IT Help Desk API
  version: 2.1.0
  description: Endpoints JSON principais do painel.
servers:
  - url: /
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Status do sistema
  /notifications:
    get:
      summary: Lista notificações do usuário autenticado
      responses:
        '200':
          description: Notificações e contagem de não lidas
  /notifications/read:
    post:
      summary: Marca notificação como lida
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id:
                  type: integer
  /tickets/create:
    post:
      summary: Cria chamado
  /tickets/status:
    post:
      summary: Atualiza status do chamado
  /settings:
    get:
      summary: Configurações do sistema (admin)
  /dashboard/daily-destinations:
    get:
      summary: Estatísticas de destinos de diárias (gráfico)
  /security/two-factor:
    get:
      summary: Status do 2FA do usuário staff
