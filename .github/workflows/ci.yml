name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: helpdesk
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo_mysql

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install npm dependencies and build CSS
        run: npm ci && npm run build:css

      - name: Import schema and run migrations
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: helpdesk
          DB_USER: root
          DB_PASS: root
        run: |
          mysql -h 127.0.0.1 -uroot -proot helpdesk < database/schema.sql
          php bin/migrate.php

      - name: PHP syntax check
        run: find app public bin -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Integration smoke tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: helpdesk
          DB_USER: root
          DB_PASS: root
          APP_TEST_URL: http://127.0.0.1:8000
        run: |
          php -S 127.0.0.1:8000 -t public public/index.php &
          sleep 2
          vendor/bin/phpunit --testsuite Integration
